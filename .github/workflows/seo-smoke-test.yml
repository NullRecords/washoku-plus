name: SEO Smoke Test

on:
  workflow_dispatch:
  schedule:
    - cron: "17 8 * * *"

jobs:
  seo-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run SEO smoke checks against production
        env:
          BASE_URL: https://www.washokuplus.com
        run: |
          bash scripts/seo_smoke_test.sh
